name: Sincronización DB (cron-db)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Ejecuta a las 05:00 UTC (06:00 Hora España peninsular, puede variar 1h por horario de verano)
    # Todos los lunes
    - cron: '0 5 * * 1'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  run-sync:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./sd-birthday-db

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm ci || npm install

      - name: Crear google-auth.json
        env:
          GOOGLE_AUTH_JSON: ${{ secrets.GOOGLE_AUTH_JSON }}
        run: |
          if [ -z "$GOOGLE_AUTH_JSON" ]; then
            echo "ERROR CRITICO: El secret GOOGLE_AUTH_JSON no está configurado o está vacío en GitHub."
            exit 1
          fi
          cat << 'EOF' > google-auth.json
          ${{ secrets.GOOGLE_AUTH_JSON }}
          EOF
      - name: Ejecutar script de sincronización
        env:
          API_URL: ${{ secrets.API_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_TABLE: ${{ secrets.DB_TABLE }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
        run: node src/index.js --manual
